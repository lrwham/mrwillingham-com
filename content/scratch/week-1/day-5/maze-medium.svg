<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360">

  <!-- === OUTER WALLS (2 cells = 16px thick) === -->

  <!-- Top wall — gap at x=32‑64 for Start -->
  <rect x="0"  y="0" width="32"  height="16" fill="black"/>
  <rect x="64" y="0" width="416" height="16" fill="black"/>

  <!-- Bottom wall — gap at x=416‑448 for Finish -->
  <rect x="0"   y="344" width="416" height="16" fill="black"/>
  <rect x="448" y="344" width="32"  height="16" fill="black"/>

  <!-- Left wall -->
  <rect x="0" y="0" width="16" height="360" fill="black"/>

  <!-- Right wall -->
  <rect x="464" y="0" width="16" height="360" fill="black"/>

  <!-- === INTERNAL WALLS (all 2 cells = 16px thick) === -->

  <!-- Wall 1: horizontal from left, row 10 — gap on right (x=304‑464) -->
  <rect x="16" y="80" width="288" height="16" fill="black"/>

  <!-- Wall 2: horizontal from right, row 22 — gap on left (x=16‑160) -->
  <rect x="160" y="176" width="304" height="16" fill="black"/>

  <!-- Wall 3: horizontal from left, row 34 — gap on right (x=320‑464) -->
  <rect x="16" y="272" width="304" height="16" fill="black"/>

  <!-- Wall 4: vertical dead-end wall between Walls 1 & 2 on the right -->
  <!-- Dead end: x=400‑464, y=96‑176 -->
  <rect x="384" y="96" width="16" height="80" fill="black"/>

  <!-- Wall 5: vertical dead-end wall between Walls 2 & 3 on the left -->
  <!-- Dead end: x=16‑96, y=192‑272 -->
  <rect x="96" y="192" width="16" height="80" fill="black"/>

  <!-- === START / FINISH MARKERS === -->

  <!-- Green marker at Start entrance -->
  <rect x="36" y="0" width="24" height="12" fill="#22c55e"/>

  <!-- Red marker at Finish exit -->
  <rect x="420" y="348" width="24" height="12" fill="#ef4444"/>

</svg>
