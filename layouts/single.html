{{ define "head_extra" }}
<link rel="stylesheet" href="/css/lesson-sections.css" />
{{ end }}

{{ define "main" }}
<div class="max-w-3xl mx-auto px-4 py-12">
  <a href="../" class="text-slate-400 hover:text-white text-sm">&larr; Back to Daily Instructions</a>
  <h1 class="text-3xl font-bold mt-4 mb-1">{{ .Title }}</h1>
  {{ if ne .Params.show_date false }}
  <p class="text-slate-400 mb-8">
    {{ .Date.Format "Monday, January 2, 2006" }}
  </p>
  {{ end }}
  <div class="prose prose-invert max-w-none">{{ .Content }}</div>
</div>
{{ end }}
